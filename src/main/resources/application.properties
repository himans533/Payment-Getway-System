spring.application.name=Payment-Getway-System

server.port=${SERVER_PORT:${PORT:9090}}
spring.devtools.livereload.enabled=false

spring.datasource.url=jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Razorpay
# Set these environment variables before testing real Razorpay checkout.
razorpay.key=rzp_test_SpEnhl63WRzXMm
razorpay.secret=msBygECm06PzkkgaR7RBlbRf
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
